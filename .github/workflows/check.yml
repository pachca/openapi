name: Check

on:
  pull_request:
    branches:
      - main

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck, format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Full history so changelog-sync can diff against origin/main.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Changelog sync (code ↔ changelog)
        run: |
          git fetch --no-tags origin main
          node scripts/check-changelog-sync.mjs
        env:
          CHANGELOG_SYNC_BASE: origin/main

      - name: Run checks
        run: bun turbo check
