name: Generator

on:
  push:
    branches: [main]
    paths:
      - "packages/generator/**"
      - "packages/spec/openapi.yaml"
      - ".github/workflows/generator.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/generator/**"
      - "packages/spec/openapi.yaml"
      - ".github/workflows/generator.yml"

concurrency:
  group: generator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snapshot-tests:
    name: Snapshot tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run snapshot tests
        working-directory: packages/generator
        run: |
          failed=0
          for test in tests/*/test.sh; do
            echo "::group::${test}"
            if bash "$test"; then
              echo "PASS: $test"
            else
              echo "::error::FAIL: $test"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed

  e2e:
    name: E2E generate & validate
    runs-on: ubuntu-latest
    needs: snapshot-tests
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate SDKs
        run: |
          bun packages/generator/bin/generator.ts \
            --spec packages/spec/openapi.yaml \
            --output "$RUNNER_TEMP/sdk" \
            --lang typescript,python,go,kotlin,swift

      - name: Validate TypeScript
        run: |
          cat > "$RUNNER_TEMP/sdk/ts/tsconfig.json" << 'EOF'
          {
            "compilerOptions": {
              "strict": true,
              "target": "ES2022",
              "module": "ES2022",
              "moduleResolution": "bundler",
              "noEmit": true,
              "skipLibCheck": true,
              "lib": ["ES2022"]
            },
            "include": ["**/*.ts"]
          }
          EOF
          npx tsc --noEmit --project "$RUNNER_TEMP/sdk/ts/tsconfig.json"

      - name: Validate Python
        run: python -m compileall -q "$RUNNER_TEMP/sdk/py"

      - name: Validate Go
        run: |
          cd "$RUNNER_TEMP/sdk/go"
          go mod init pachca/sdk
          go vet ./...

      - name: Validate Kotlin
        run: |
          kotlinc "$RUNNER_TEMP/sdk/kt/"*.kt -d "$RUNNER_TEMP/sdk/kt/out" 2>&1

      - name: Validate Swift
        run: |
          swiftc -typecheck "$RUNNER_TEMP/sdk/swift/"*.swift
