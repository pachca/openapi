name: SDK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      cli_changed: ${{ steps.cli_check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: swift-actions/setup-swift@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: bun install
      - name: Generate SDKs
        run: npx turbo run generate

      - name: Check for CLI changes
        if: github.event_name == 'push'
        id: cli_check
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGED=$(git diff --name-only "$PREV_TAG" HEAD -- packages/cli/ | grep -q . && echo true || echo false)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- packages/cli/ | grep -q . && echo true || echo false)
          fi
          # Also check uncommitted changes from generate
          if git diff --name-only -- packages/cli/ | grep -q .; then
            CHANGED=true
          fi
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Build TypeScript SDK
        run: npm run build
        working-directory: sdk/typescript

      - name: Copy Swift Package.swift to root
        if: github.event_name == 'push'
        run: cp sdk/swift/Package.swift Package.swift

      - name: Extract version
        if: github.event_name == 'push'
        id: version
        run: |
          VERSION=$(grep -oP 'version:\s*"\K[^"]+' packages/spec/typespec.tsp)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: regenerate SDK v${{ steps.version.outputs.version }}"

      - name: Tag
        if: github.event_name == 'push'
        run: |
          git tag -f "v${{ steps.version.outputs.version }}"
          git tag -f "sdk/go/generated/v${{ steps.version.outputs.version }}"

      - name: Push
        if: github.event_name == 'push'
        run: git push && git push --tags --force

  publish-npm:
    if: github.event_name == 'push'
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.generate.outputs.version }}
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Build TypeScript SDK
        run: npm run build
        working-directory: sdk/typescript
      - name: Publish to npm
        working-directory: sdk/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@pachca/sdk@${VERSION}" version 2>/dev/null; then
            echo "Version ${VERSION} already published, skipping"
          else
            npm publish --access public
          fi

  publish-cli:
    if: github.event_name == 'push' && needs.generate.outputs.cli_changed == 'true'
    needs: generate
    runs-on: ubuntu-latest
    concurrency:
      group: publish-cli
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: bun install --frozen-lockfile
      - name: Set CLI version (CalVer YYYY.M.patch)
        id: version
        run: |
          VERSION=$(node -e "
            const { execSync } = require('child_process');
            const d = new Date();
            const base = d.getFullYear() + '.' + (d.getMonth()+1);
            let versions = [];
            try {
              const raw = execSync('npm view @pachca/cli versions --json', { stdio: ['pipe', 'pipe', 'pipe'] }).toString().trim();
              const parsed = JSON.parse(raw);
              versions = Array.isArray(parsed) ? parsed : [parsed];
            } catch {}
            const patch = versions.filter(v => v.startsWith(base + '.')).length;
            console.log(base + '.' + patch);
          ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          cd packages/cli && node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('package.json'));p.version='$VERSION';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
      - name: Generate changelog
        run: npx tsx scripts/diff-endpoints.ts
        working-directory: packages/cli
      - run: npm run build
        working-directory: packages/cli
      - working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          OUTPUT=$(npm publish --access public --provenance 2>&1) || {
            CODE=$?
            if echo "$OUTPUT" | grep -q "E409\|already exists"; then
              CURRENT=$(node -e "console.log(require('./package.json').version)")
              PATCH=$(echo $CURRENT | cut -d. -f3)
              BASE=$(echo $CURRENT | cut -d. -f1-2)
              node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('package.json'));p.version='${BASE}.$((PATCH+1))';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
              npm publish --access public --provenance
            else
              echo "$OUTPUT"
              exit $CODE
            fi
          }

  publish-pypi:
    if: github.event_name == 'push'
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.generate.outputs.version }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build twine
      - name: Build Python SDK
        run: python -m build
        working-directory: sdk/python/generated
      - name: Publish to PyPI
        run: twine upload --skip-existing sdk/python/generated/dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  publish-jitpack:
    if: github.event_name == 'push'
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: badasintended/autojitpack@v1
        with:
          version: v${{ needs.generate.outputs.version }}
