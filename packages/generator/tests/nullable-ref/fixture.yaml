openapi: 3.0.0
info:
  title: Test API — Nullable Ref
  version: 1.0.0
paths: {}
components:
  schemas:
    Address:
      type: object
      required:
        - city
      properties:
        city:
          type: string
        zip:
          type: string

    Person:
      type: object
      required:
        - id
        - name
        - home_address
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        home_address:
          $ref: '#/components/schemas/Address'
          nullable: true
          description: Home address (nullable ref)
        work_address:
          $ref: '#/components/schemas/Address'
          description: Work address (non-nullable ref)
