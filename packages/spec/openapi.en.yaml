      x-paginated: true
      x-requirements:
        scope: chats:read
  /chats/exports:
    post:
      operationId: ExportOperations_requestExport
      description: |-
        Export messages

        Request a message export for the specified time period.
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
