paths:
  /audit_events:
    get:
      operationId: SecurityOperations_getAuditEvents
      description: |-
        Audit event log

        Retrieve event logs based on the specified filters.
      parameters:
        - name: start_time
          in: query
          required: false
          description: Start timestamp (inclusive)
          schema:
            type: string
            format: date-time
            example: '2025-05-01T09:11:00Z'
          example: '2025-05-01T09:11:00Z'
          explode: false
        - name: end_time
          in: query
          required: false
          description: End timestamp (exclusive)
          schema:
            type: string
            format: date-time
            example: '2025-05-02T09:11:00Z'
          example: '2025-05-02T09:11:00Z'
          explode: false
        - name: event_key
          in: query
          required: false
          description: Filter by specific event type
          schema:
            $ref: '#/components/schemas/AuditEventKey'
            example: user_login
          example: user_login
          explode: false
        - name: actor_id
          in: query
          required: false
          description: ID of the user who performed the action
          schema:
            type: string
            example: '98765'
          example: '98765'
          explode: false
        - name: actor_type
          in: query
          required: false
          description: Actor type
          schema:
            type: string
            example: User
          example: User
          explode: false
        - name: entity_id
          in: query
          required: false
          description: ID of the affected entity
          schema:
            type: string
            example: '98765'
          example: '98765'
          explode: false
        - name: entity_type
          in: query
          required: false
          description: Entity type
          schema:
            type: string
            example: User
          example: User
          explode: false
        - name: limit
          in: query
          required: false
          description: Number of records to return
          schema:
            type: integer
            format: int32
            maximum: 50
            example: 1
            default: 50
          example: 1
          explode: false
        - name: cursor
          in: query
          required: false
          description: Pagination cursor (from `meta.paginate.next_page`)
          schema:
            type: string
            example: eyJpZCI6MTAsImRpciI6ImFzYyJ9
          example: eyJpZCI6MTAsImRpciI6ImFzYyJ9
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEvent'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                description: Response wrapper with data and pagination
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
        '402':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
        '422':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
      tags:
        - Security
      x-paginated: true
      x-requirements:
        scope: audit_events:read
        plan: corporation
  /bots/{id}:
    put:
      operationId: BotOperations_updateBot
      description: >-
        Edit bot


        Edit a bot's settings.


        To edit a bot you need to know its `user_id` and specify it in the request `URL`. All editable bot parameters
        are specified in the request body. You can find the bot's `user_id` in the bot settings under the "API" tab.


        You cannot edit a bot whose settings are not accessible to you (the "Who can edit bot settings" field is located
        on the "General" tab in the bot settings).
      parameters:
        - name: id
          in: path
          required: true
          description: Bot ID
          schema:
            type: integer
            format: int32
            example: 1738816
          example: 1738816
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/BotResponse'
                description: Response wrapper with data
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
        '402':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '422':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
      tags:
        - Bots
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BotUpdateRequest'
      x-requirements:
        scope: bots:write
  /chats:
    post:
      operationId: ChatOperations_createChat
      description: |-
        New chat

        Create a new chat.

        To create a one-on-one direct message with a user, use the [New message](POST /messages) method.

        When creating a chat, you automatically become a member.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Chat'
                description: Response wrapper with data
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
        '402':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
        '422':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
      tags:
        - Chats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCreateRequest'
      x-requirements:
        scope: chats:create
    get:
      operationId: ChatOperations_listChats
      description: |-
        List chats

        Retrieve a list of chats based on the specified parameters.
      parameters:
        - name: sort
          in: query
          required: false
          description: Sort field
          schema:
            allOf:
              - $ref: '#/components/schemas/ChatSortField'
            default: id
          example: id
          explode: false
        - name: order
          in: query
          required: false
          description: Sort direction
          schema:
            allOf:
              - $ref: '#/components/schemas/SortOrder'
            default: desc
          example: desc
          explode: false
        - name: availability
          in: query
          required: false
          description: Parameter that controls chat availability and filtering for the user
          schema:
            allOf:
              - $ref: '#/components/schemas/ChatAvailability'
            default: is_member
          example: is_member
          explode: false
        - name: last_message_at_after
          in: query
          required: false
          description: >-
            Filter by last message creation time. Returns chats where the last message was created no earlier than the
            specified time (in YYYY-MM-DDThh:mm:ss.sssZ format).
          schema:
            type: string
            format: date-time
            example: '2025-01-01T00:00:00.000Z'
          example: '2025-01-01T00:00:00.000Z'
          explode: false
        - name: last_message_at_before
          in: query
          required: false
          description: >-
            Filter by last message creation time. Returns chats where the last message was created no later than the
            specified time (in YYYY-MM-DDThh:mm:ss.sssZ format).
          schema:
            type: string
            format: date-time
            example: '2025-02-01T00:00:00.000Z'
          example: '2025-02-01T00:00:00.000Z'
          explode: false
        - name: personal
          in: query
          required: false
          description: Filter by direct and group chats. If not specified, all chats are returned.
          schema:
            type: boolean
            example: false
          example: false
          explode: false
        - name: limit
          in: query
          required: false
          description: Number of records to return per request
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 50
            example: 1
            default: 50
          example: 1
          explode: false
        - name: cursor
          in: query
          required: false
          description: Pagination cursor (from `meta.paginate.next_page`)
          schema:
            type: string
            example: eyJpZCI6MTAsImRpciI6ImFzYyJ9
          example: eyJpZCI6MTAsImRpciI6ImFzYyJ9
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Chat'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                description: Response wrapper with data and pagination
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
