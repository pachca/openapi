security:
  - BearerAuth: []
components:
  schemas:
    AccessTokenInfo:
      type: object
      required:
        - id
        - token
        - name
        - user_id
        - scopes
        - created_at
        - revoked_at
        - expires_in
        - last_used_at
      properties:
        id:
          type: integer
          format: int64
          description: Token ID
          example: 4827
        token:
          type: string
          description: Masked token (first 8 and last 4 characters visible)
          example: cH5kR9mN...x7Qp
        name:
          type: string
          nullable: true
          description: User-defined token name
          example: My API Token
        user_id:
          type: integer
          format: int64
          description: Token owner ID
          example: 12
        scopes:
          type: array
          items:
            $ref: '#/components/schemas/OAuthScope'
          description: List of token scopes
          example:
            - messages:read
            - chats:read
        created_at:
          type: string
          format: date-time
          description: Token creation date
          example: '2025-01-15T10:30:00.000Z'
        revoked_at:
          type: string
          format: date-time
          nullable: true
          description: Token revocation date
          example: null
        expires_in:
          type: integer
          format: int32
          nullable: true
          description: Token lifetime in seconds
          example: null
        last_used_at:
          type: string
          format: date-time
          nullable: true
          description: Token last used date
          example: '2025-02-24T14:20:00.000Z'
      description: Access token
    AddMembersRequest:
      type: object
      required:
        - member_ids
      properties:
        member_ids:
          type: array
          items:
            type: integer
            format: int32
          description: Array of user IDs who will become members
          example:
            - 186
            - 187
        silent:
          type: boolean
          description: Whether to skip creating a system message about adding members
          example: true
      description: Request to add members to a chat
    AddTagsRequest:
      type: object
      required:
        - group_tag_ids
      properties:
        group_tag_ids:
          type: array
          items:
            type: integer
            format: int32
          description: Array of tag IDs to be added as members
          example:
            - 86
            - 18
      description: Request to add tags to a chat
    ApiError:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ApiErrorItem'
          description: Array of errors
      description: API error (used for 400, 402, 403, 404, 409, 410, 422)
      x-error: true
    ApiErrorItem:
      type: object
      required:
        - key
        - value
        - message
        - code
        - payload
      properties:
        key:
          type: string
          description: Field key that caused the error
          example: field.name
        value:
          type: string
          nullable: true
          description: Field value that caused the error
          example: invalid_value
        message:
          type: string
          description: Error message
          example: Field cannot be empty
        code:
          allOf:
            - $ref: '#/components/schemas/ValidationErrorCode'
          description: Error code
          example: blank
        payload:
          type: object
          additionalProperties: {}
          nullable: true
          description: >-
            Additional error data. Content depends on the error code: `{id: number}` for custom property errors, `{type:
            string}` for type mismatch errors
          example: null
      description: Detailed error information
    AuditDetailsChatId:
      type: object
      required:
        - chat_id
      properties:
        chat_id:
          type: integer
          format: int32
          description: Chat ID
      description: 'For: tag_removed_from_chat'
    AuditDetailsChatPermission:
      type: object
      required:
        - public_access
      properties:
        public_access:
          type: boolean
          description: Public access
      description: 'For: chat_permission_changed'
    AuditDetailsChatRenamed:
      type: object
      required:
        - old_name
        - new_name
      properties:
        old_name:
          type: string
          description: Previous chat name
        new_name:
          type: string
          description: New chat name
      description: 'For: chat_renamed'
    AuditDetailsDlp:
      type: object
      required:
        - dlp_rule_id
        - dlp_rule_name
        - message_id
        - chat_id
        - user_id
        - action_message
        - conditions_matched
      properties:
        dlp_rule_id:
          type: integer
          format: int32
          description: DLP rule ID
        dlp_rule_name:
          type: string
          description: DLP rule name
        message_id:
          type: integer
          format: int32
          description: Message ID
        chat_id:
          type: integer
          format: int32
          description: Chat ID
        user_id:
          type: integer
          format: int32
          description: User ID
        action_message:
          type: string
          description: Action description
        conditions_matched:
          type: boolean
          description: Rule conditions check result (true — conditions matched)
      description: 'For: dlp_violation_detected'
    AuditDetailsEmpty:
      type: object
      description: >-
        Empty details. For: user_login, user_logout, user_2fa_fail, user_2fa_success, user_created, user_deleted,
        chat_created, message_created, message_updated, message_deleted, reaction_created, reaction_deleted,
        thread_created, audit_events_accessed
    AuditDetailsInitiator:
      type: object
      required:
        - initiator_id
      properties:
        initiator_id:
          type: integer
          format: int32
          description: Action initiator ID
      description: 'For: user_added_to_tag, user_removed_from_tag, user_chat_leave'
    AuditDetailsInviter:
      type: object
      required:
        - inviter_id
      properties:
        inviter_id:
          type: integer
          format: int32
          description: Inviter ID
      description: 'For: user_chat_join'
    AuditDetailsKms:
      type: object
      required:
        - chat_id
        - message_id
        - reason
      properties:
        chat_id:
          type: integer
          format: int32
          description: Chat ID
        message_id:
          type: integer
          format: int32
          description: Message ID
        reason:
          type: string
          description: Operation reason
      description: 'For: kms_encrypt, kms_decrypt'
    AuditDetailsRoleChanged:
      type: object
      required:
        - new_company_role
        - previous_company_role
        - initiator_id
      properties:
        new_company_role:
          type: string
          description: New role
        previous_company_role:
          type: string
          description: Previous role
        initiator_id:
          type: integer
          format: int32
          description: Initiator ID
      description: 'For: user_role_changed'
    AuditDetailsSearch:
      type: object
      required:
        - search_type
        - query_present
        - cursor_present
        - limit
        - filters
      properties:
        search_type:
          type: string
          description: Search type
        query_present:
          type: boolean
          description: Whether a search query was specified
        cursor_present:
          type: boolean
          description: Whether a cursor was used
        limit:
          type: integer
          format: int32
          description: Number of returned results
        filters:
          type: object
          additionalProperties: {}
          description: >-
            Applied filters. Possible keys depend on the search type: order, sort, created_from, created_to,
            company_roles (users), active, chat_subtype, personal (chats), chat_ids, user_ids (messages)
      description: 'For: search_users_api, search_chats_api, search_messages_api'
    AuditDetailsTagChat:
      type: object
      required:
        - chat_id
        - tag_name
      properties:
        chat_id:
          type: integer
          format: int32
          description: Chat ID
        tag_name:
          type: string
          description: Tag name
      description: 'For: tag_added_to_chat'
    AuditDetailsTagName:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Tag name
      description: 'For: tag_created, tag_deleted'
    AuditDetailsTokenScopes:
      type: object
      required:
        - scopes
      properties:
        scopes:
          type: array
          items:
            type: string
          description: Token scopes
      description: 'For: access_token_created, access_token_updated, access_token_destroy'
    AuditDetailsUserUpdated:
      type: object
      required:
        - changed_attrs
      properties:
        changed_attrs:
          type: array
          items:
            type: string
          description: List of changed fields
      description: 'For: user_updated'
    AuditEvent:
      type: object
      required:
        - id
        - created_at
        - event_key
        - entity_id
        - entity_type
        - actor_id
        - actor_type
        - details
        - ip_address
        - user_agent
      properties:
        id:
          type: string
          description: Unique event ID
          example: a1b2c3d4-5e6f-7g8h-9i10-j11k12l13m14
        created_at:
          type: string
          format: date-time
          description: Event creation date and time (ISO-8601, UTC+0) in YYYY-MM-DDThh:mm:ss.sssZ format
          example: '2025-05-15T14:30:00.000Z'
        event_key:
          allOf:
            - $ref: '#/components/schemas/AuditEventKey'
          description: Event type key
          example: user_login
        entity_id:
          type: string
          description: Affected entity ID
          example: '98765'
        entity_type:
          type: string
          description: Affected entity type
          example: User
        actor_id:
          type: string
          description: ID of the user who performed the action
          example: '98765'
        actor_type:
          type: string
          description: Actor type
          example: User
        details:
          allOf:
            - $ref: '#/components/schemas/AuditEventDetailsUnion'
          description: >-
            Additional event details. Structure depends on the event_key value — see event_key field value descriptions.
            For events without details, an empty object is returned
        ip_address:
          type: string
          description: IP address from which the action was performed
          example: 192.168.1.100
        user_agent:
          type: string
          description: Client user agent
          example: Pachca/3.60.0 (co.staply.pachca; build:15; iOS 18.5.0) Alamofire/5.0.0
      description: Audit event
    AuditEventDetailsUnion:
      anyOf:
        - $ref: '#/components/schemas/AuditDetailsEmpty'
        - $ref: '#/components/schemas/AuditDetailsUserUpdated'
        - $ref: '#/components/schemas/AuditDetailsRoleChanged'
        - $ref: '#/components/schemas/AuditDetailsTagName'
        - $ref: '#/components/schemas/AuditDetailsInitiator'
