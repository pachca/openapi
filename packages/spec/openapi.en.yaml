  /chats/{id}/members:
    get:
      operationId: ChatMemberOperations_listMembers
      description: >-
        List chat members


        Retrieve the current list of chat members.


        The workspace owner can retrieve the member list of any chat in the workspace. Admins and bots can only retrieve
        the member list of chats they belong to (or that are public).
      parameters:
        - name: id
          in: path
          required: true
          description: Chat ID
          schema:
            type: integer
            format: int32
            example: 334
          example: 334
        - name: role
          in: query
          required: false
          description: Role in the chat
          schema:
            allOf:
              - $ref: '#/components/schemas/ChatMemberRoleFilter'
            default: all
          example: all
          explode: false
        - name: limit
          in: query
          required: false
          description: Number of records to return per request
