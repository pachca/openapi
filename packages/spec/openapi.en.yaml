          type: string
          maxLength: 2000
          description: Hint displayed below the field in gray
          example: Others might suggest the best places to visit
      description: Input block — text input field
    ViewBlockMarkdown:
      type: object
      required:
        - type
        - text
      properties:
        type:
          type: string
          enum:
            - markdown
          description: Block type
          example: markdown
          x-enum-descriptions:
            markdown: Always markdown for formatted text
        text:
          type: string
          maxLength: 12000
          description: Text
          example: You can read about your available vacation days at [this link](https://www.website.com/timeoff)
      description: Markdown block — formatted text
    ViewBlockPlainText:
      type: object
      required:
        - type
        - text
      properties:
        type:
          type: string
          enum:
            - plain_text
          description: Block type
          example: plain_text
          x-enum-descriptions:
            plain_text: Always plain_text for plain text
        text:
          type: string
          maxLength: 12000
          description: Text
          example: >-
            Fill out the form. After submitting, a text notification will be sent to the general chat, and your vacation
            will be saved in the database.
      description: Plain text block — plain text
    ViewBlockRadio:
      type: object
      required:
        - type
        - name
        - label
      properties:
        type:
          type: string
          enum:
            - radio
          description: Block type
          example: radio
          x-enum-descriptions:
            radio: Always radio for radio buttons
        name:
          type: string
          maxLength: 255
          description: Name that will be sent to your application as the key for the user-selected choice
          example: accessibility
        label:
          type: string
          maxLength: 150
          description: Radio button group label
          example: Availability
        options:
          type: array
          items:
            $ref: '#/components/schemas/ViewBlockSelectableOption'
          maxItems: 10
          description: Array of radio buttons
        required:
          type: boolean
          description: Required
          example: true
        hint:
          type: string
          maxLength: 2000
          description: Hint displayed below the radio button group in gray
          example: If you do not plan to be available, select None
      description: Radio block — radio buttons
    ViewBlockSelect:
      type: object
      required:
        - type
        - name
        - label
      properties:
        type:
          type: string
          enum:
            - select
          description: Block type
          example: select
          x-enum-descriptions:
            select: Always select for dropdowns
        name:
          type: string
          maxLength: 255
          description: Name that will be sent to your application as the key for the user-selected choice
          example: team
        label:
          type: string
          maxLength: 150
          description: Dropdown label
          example: Select a team
        options:
          type: array
          items:
            $ref: '#/components/schemas/ViewBlockSelectableOption'
          maxItems: 100
          description: Array of available items in the dropdown
        required:
          type: boolean
          description: Required
          example: false
        hint:
          type: string
          maxLength: 2000
          description: Hint displayed below the dropdown in gray
          example: Select one of the teams
      description: Select block — dropdown
    ViewBlockSelectableOption:
      type: object
      required:
        - text
        - value
      properties:
        text:
          type: string
          maxLength: 75
          description: Select option label text
          example: None
        value:
          type: string
          maxLength: 150
          description: Select option value
          example: nothing
        description:
          type: string
          maxLength: 75
          description: Select option description
          example: Every day the bot will send a list of new tasks in your team
        selected:
          type: boolean
          description: Whether this select option is selected by default
          example: true
      description: Option for select, radio, and checkbox blocks
    ViewBlockTime:
      type: object
      required:
        - type
        - name
        - label
      properties:
        type:
          type: string
          enum:
            - time
          description: Block type
          example: time
          x-enum-descriptions:
            time: Always time for time picker
        name:
          type: string
          maxLength: 255
          description: Name that will be sent to your application as the key for the user-specified value
          example: newsletter_time
        label:
          type: string
          maxLength: 150
          description: Field label
          example: Newsletter time
        initial_time:
          type: string
          format: time
          description: Initial field value in HH:mm format
          example: '11:00'
        required:
          type: boolean
          description: Required
          example: false
        hint:
          type: string
          maxLength: 2000
          description: Hint displayed below the field in gray
          example: Specify the time to send the selected newsletters
      description: Time block — time picker
    ViewBlockUnion:
      anyOf:
        - $ref: '#/components/schemas/ViewBlockHeader'
        - $ref: '#/components/schemas/ViewBlockPlainText'
        - $ref: '#/components/schemas/ViewBlockMarkdown'
        - $ref: '#/components/schemas/ViewBlockDivider'
        - $ref: '#/components/schemas/ViewBlockInput'
        - $ref: '#/components/schemas/ViewBlockSelect'
        - $ref: '#/components/schemas/ViewBlockRadio'
        - $ref: '#/components/schemas/ViewBlockCheckbox'
        - $ref: '#/components/schemas/ViewBlockDate'
        - $ref: '#/components/schemas/ViewBlockTime'
        - $ref: '#/components/schemas/ViewBlockFileInput'
      description: Union type for all possible view blocks
    ViewSubmitWebhookPayload:
      type: object
      required:
        - type
        - event
        - callback_id
        - private_metadata
        - user_id
        - data
        - webhook_timestamp
      properties:
        type:
          type: string
          enum:
            - view
          description: Object type
          example: view
          x-enum-descriptions:
            view: Always view for forms
        event:
          type: string
          enum:
            - submit
          description: Event type
          example: submit
          x-enum-descriptions:
            submit: Form submission
        callback_id:
          type: string
          nullable: true
          description: Callback ID specified when opening the view
          example: timeoff_request_form
        private_metadata:
          type: string
          nullable: true
          description: Private metadata specified when opening the view
          example: '{''timeoff_id'':4378}'
        user_id:
          type: integer
          format: int32
          description: ID of the user who submitted the form
          example: 1235523
        data:
          type: object
          additionalProperties: {}
          description: Submitted view field data. Key — field `action_id`, value — entered data
        webhook_timestamp:
          type: integer
          format: int32
          description: Webhook send date and time (UTC+0) in UNIX format
          example: 1755075544
      description: Outgoing webhook payload for form submission
    WebhookEvent:
      type: object
      required:
        - id
        - event_type
        - payload
        - created_at
      properties:
        id:
          type: string
          description: Event ID
          example: 01KAJZ2XDSS2S3DSW9EXJZ0TBV
        event_type:
          type: string
          description: Event type
          example: message_new
        payload:
          allOf:
            - $ref: '#/components/schemas/WebhookPayloadUnion'
          description: Webhook object
        created_at:
          type: string
          format: date-time
          description: Event creation date and time (ISO-8601, UTC+0) in YYYY-MM-DDThh:mm:ss.sssZ format
          example: '2025-05-15T14:30:00.000Z'
      description: Outgoing webhook event
    WebhookEventType:
      type: string
      enum:
        - new
        - update
        - delete
      description: Webhook event type
      x-enum-descriptions:
        new: Created
        update: Update
        delete: Deleted
    WebhookLink:
      type: object
      required:
        - url
        - domain
      properties:
        url:
          type: string
          description: Link URL
          example: https://example.com/page1
        domain:
          type: string
          description: Link domain
          example: example.com
      description: Link object in the link unfurling webhook
    WebhookMessageThread:
      type: object
      required:
        - message_id
        - message_chat_id
      properties:
        message_id:
          type: integer
          format: int32
          description: ID of the message the thread was created for
          example: 12345
        message_chat_id:
          type: integer
          format: int32
          description: ID of the chat of the message the thread was created for
          example: 67890
      description: Thread object in the message webhook
    WebhookPayloadUnion:
      anyOf:
        - $ref: '#/components/schemas/MessageWebhookPayload'
        - $ref: '#/components/schemas/ReactionWebhookPayload'
        - $ref: '#/components/schemas/ButtonWebhookPayload'
        - $ref: '#/components/schemas/ViewSubmitWebhookPayload'
        - $ref: '#/components/schemas/ChatMemberWebhookPayload'
        - $ref: '#/components/schemas/CompanyMemberWebhookPayload'
        - $ref: '#/components/schemas/LinkSharedWebhookPayload'
      description: Union of all webhook payload types
  securitySchemes:
    BearerAuth:
      type: http
      scheme: Bearer
servers:
  - url: https://api.pachca.com/api/shared/v1
    description: Production server
    variables: {}
