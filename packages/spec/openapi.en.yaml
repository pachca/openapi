  /webhooks/events:
    get:
      operationId: BotOperations_getWebhookEvents
      description: >-
        Event history


        Retrieve the history of a bot's recent events. This method is useful if you cannot receive events in real time
        at your `URL`, but need to process all events you have subscribed to.


        Event history is only saved when the "Save event history" option is enabled in the "Outgoing webhook" tab of the
        bot settings. Specifying a "Webhook `URL`" is not required.


        To retrieve the event history of a specific bot, you need to know its `access_token` and use it in the request.
        Each event is a webhook `JSON` object.
      parameters:
        - name: limit
          in: query
          required: false
          description: Number of records to return per request
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 50
            example: 1
            default: 50
          example: 1
          explode: false
        - name: cursor
          in: query
          required: false
          description: Pagination cursor (from `meta.paginate.next_page`)
          schema:
            type: string
            example: eyJpZCI6MTAsImRpciI6ImFzYyJ9
          example: eyJpZCI6MTAsImRpciI6ImFzYyJ9
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WebhookEvent'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                description: Response wrapper with data and pagination
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
        '402':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
        '422':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
      tags:
        - Bots
      x-paginated: true
      x-requirements:
        scope: webhooks:events:read
