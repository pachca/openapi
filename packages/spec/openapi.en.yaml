            schema:
              $ref: '#/components/schemas/ExportRequest'
      x-requirements:
        scope: chat_exports:write
        plan: corporation
  /chats/exports/{id}:
    get:
      operationId: ExportOperations_downloadExport
      description: >-
        Download export archive


        Download a completed message export archive.


        To download the archive you need to know its `id` and specify it in the request `URL`.


        The server will respond with `302 Found` and a `Location` header containing a temporary download link. Most HTTP
        clients automatically follow the redirect and download the file.
      parameters:
        - name: id
          in: path
          required: true
          description: Export ID
          schema:
            type: integer
            format: int32
            example: 22322
          example: 22322
      responses:
        '302':
          description: Redirection
          headers:
            location:
              required: true
              schema:
                type: string
                format: uri
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/OAuthError'
                  - anyOf:
                      - $ref: '#/components/schemas/ApiError'
                      - $ref: '#/components/schemas/OAuthError'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
      tags:
        - Common
      x-requirements:
        scope: chat_exports:read
        plan: corporation
