overlay: 1.0.0
info:
  title: Pachca API — English translations
  version: 1.0.0
actions:
  - target: $.paths['/audit_events'].get
    update:
      description: |-
        Audit event log

        Retrieve event logs based on the specified filters.
  - target: $.paths['/audit_events'].get.parameters[?(@.name=='start_time')]
    update:
      description: Start timestamp (inclusive)
  - target: $.paths['/audit_events'].get.parameters[?(@.name=='end_time')]
    update:
      description: End timestamp (exclusive)
  - target: $.paths['/audit_events'].get.parameters[?(@.name=='event_key')]
    update:
      description: Filter by specific event type
  - target: $.paths['/audit_events'].get.parameters[?(@.name=='actor_id')]
    update:
      description: ID of the user who performed the action
  - target: $.paths['/audit_events'].get.parameters[?(@.name=='actor_type')]
    update:
      description: Actor type
  - target: $.paths['/audit_events'].get.parameters[?(@.name=='entity_id')]
    update:
      description: ID of the affected entity
  - target: $.paths['/audit_events'].get.parameters[?(@.name=='entity_type')]
    update:
      description: Entity type
  - target: $.paths['/audit_events'].get.parameters[?(@.name=='limit')]
    update:
      description: Number of records to return
  - target: $.paths['/audit_events'].get.parameters[?(@.name=='cursor')]
    update:
      description: Pagination cursor (from `meta.paginate.next_page`)
  - target: $.paths['/bots/{id}'].put
    update:
      description: >-
        Edit bot


        Edit a bot's settings.


        To edit a bot you need to know its `user_id` and specify it in the request `URL`. All editable bot parameters
        are specified in the request body. You can find the bot's `user_id` in the bot settings under the "API" tab.


        You cannot edit a bot whose settings are not accessible to you (the "Who can edit bot settings" field is located
        on the "General" tab in the bot settings).
  - target: $.paths['/bots/{id}'].put.parameters[?(@.name=='id')]
    update:
      description: Bot ID
  - target: $.paths['/chats'].post
    update:
      description: |-
        New chat

        Create a new chat.

        To create a one-on-one direct message with a user, use the [New message](POST /messages) method.

        When creating a chat, you automatically become a member.
  - target: $.paths['/chats'].get
    update:
      description: |-
        List chats

        Retrieve a list of chats based on the specified parameters.
  - target: $.paths['/chats'].get.parameters[?(@.name=='sort')]
    update:
      description: Sort field
  - target: $.paths['/chats'].get.parameters[?(@.name=='order')]
    update:
      description: Sort direction
  - target: $.paths['/chats'].get.parameters[?(@.name=='availability')]
    update:
      description: Parameter that controls chat availability and filtering for the user
  - target: $.paths['/chats'].get.parameters[?(@.name=='last_message_at_after')]
    update:
      description: >-
        Filter by last message creation time. Returns chats where the last message was created no earlier than the
        specified time (in YYYY-MM-DDThh:mm:ss.sssZ format).
  - target: $.paths['/chats'].get.parameters[?(@.name=='last_message_at_before')]
    update:
      description: >-
        Filter by last message creation time. Returns chats where the last message was created no later than the
        specified time (in YYYY-MM-DDThh:mm:ss.sssZ format).
  - target: $.paths['/chats'].get.parameters[?(@.name=='personal')]
    update:
      description: Filter by direct and group chats. If not specified, all chats are returned.
  - target: $.paths['/chats'].get.parameters[?(@.name=='limit')]
    update:
      description: Number of records to return per request
  - target: $.paths['/chats'].get.parameters[?(@.name=='cursor')]
    update:
      description: Pagination cursor (from `meta.paginate.next_page`)
  - target: $.paths['/chats/exports'].post
    update:
      description: |-
        Export messages

        Request a message export for the specified time period.
  - target: $.paths['/chats/exports/{id}'].get
    update:
      description: >-
        Download export archive


        Download a completed message export archive.


        To download the archive you need to know its `id` and specify it in the request `URL`.


        The server will respond with `302 Found` and a `Location` header containing a temporary download link. Most HTTP
        clients automatically follow the redirect and download the file.
  - target: $.paths['/chats/exports/{id}'].get.parameters[?(@.name=='id')]
    update:
      description: Export ID
  - target: $.paths['/chats/{id}'].get
    update:
      description: |-
        Chat info

        Retrieve information about a chat.

        To get a chat you need to know its `id` and specify it in the request `URL`.
  - target: $.paths['/chats/{id}'].get.parameters[?(@.name=='id')]
    update:
      description: Chat ID
  - target: $.paths['/chats/{id}'].put
    update:
      description: >-
        Update chat


        Update chat parameters.


        To update a chat you need to know its `id` and specify it in the `URL`. All updatable fields are passed in the
        request body.
  - target: $.paths['/chats/{id}'].put.parameters[?(@.name=='id')]
    update:
      description: Chat ID
  - target: $.paths['/chats/{id}/archive'].put
    update:
      description: |-
        Archive chat

        Archive a chat.

        To archive a chat you need to know its `id` and specify it in the request `URL`.
  - target: $.paths['/chats/{id}/archive'].put.parameters[?(@.name=='id')]
    update:
      description: Chat ID
  - target: $.paths['/chats/{id}/group_tags'].post
    update:
      description: >-
        Add tags


        Add tags to the member list of a conversation or channel.


        After adding a tag, all its members automatically become members of the chat. The tag and chat member lists are
        synchronized automatically: when a new member is added to the tag, they immediately appear in the chat; when
        removed from the tag, they are removed from the chat.
  - target: $.paths['/chats/{id}/group_tags'].post.parameters[?(@.name=='id')]
    update:
      description: Chat ID
  - target: $.paths['/chats/{id}/group_tags/{tag_id}'].delete
    update:
      description: |-
        Remove tag

        Remove a tag from the member list of a conversation or channel.

        To remove a tag you need to know its `id` and specify it in the request `URL`.
  - target: $.paths['/chats/{id}/group_tags/{tag_id}'].delete.parameters[?(@.name=='id')]
    update:
      description: Chat ID
  - target: $.paths['/chats/{id}/group_tags/{tag_id}'].delete.parameters[?(@.name=='tag_id')]
    update:
      description: Tag ID
  - target: $.paths['/chats/{id}/leave'].delete
    update:
      description: |-
        Leave conversation or channel

        Leave a conversation or channel on your own.
  - target: $.paths['/chats/{id}/leave'].delete.parameters[?(@.name=='id')]
    update:
      description: Chat ID
  - target: $.paths['/chats/{id}/members'].get
    update:
      description: >-
        List chat members


        Retrieve the current list of chat members.


        The workspace owner can retrieve the member list of any chat in the workspace. Admins and bots can only retrieve
        the member list of chats they belong to (or that are public).
  - target: $.paths['/chats/{id}/members'].get.parameters[?(@.name=='id')]
    update:
      description: Chat ID
  - target: $.paths['/chats/{id}/members'].get.parameters[?(@.name=='role')]
    update:
      description: Role in the chat
  - target: $.paths['/chats/{id}/members'].get.parameters[?(@.name=='limit')]
    update:
      description: Number of records to return per request
  - target: $.paths['/chats/{id}/members'].get.parameters[?(@.name=='cursor')]
    update:
      description: Pagination cursor (from `meta.paginate.next_page`)
  - target: $.paths['/chats/{id}/members'].post
    update:
      description: |-
        Add users

        Add users to the member list of a conversation, channel, or thread.
  - target: $.paths['/chats/{id}/members'].post.parameters[?(@.name=='id')]
    update:
      description: Chat ID (conversation, channel, or thread chat)
  - target: $.paths['/chats/{id}/members/{user_id}'].delete
    update:
      description: >-
        Remove user


        Remove a user from the member list of a conversation or channel.


        If the user is the chat owner, they cannot be removed. They can only leave the chat on their own using the
        [Leave conversation or channel](DELETE /chats/{id}/leave) method.
  - target: $.paths['/chats/{id}/members/{user_id}'].delete.parameters[?(@.name=='id')]
    update:
      description: Chat ID
  - target: $.paths['/chats/{id}/members/{user_id}'].delete.parameters[?(@.name=='user_id')]
    update:
      description: User ID
  - target: $.paths['/chats/{id}/members/{user_id}'].put
    update:
      description: >-
        Edit role


        Edit a user's or bot's role in a conversation or channel.


        To edit a role in a conversation or channel you need to know the `id` of the chat and the user (or bot) and
        specify them in the request `URL`. All editable role parameters are specified in the request body.


        The chat owner's role cannot be changed. They always have Admin privileges in the chat.
  - target: $.paths['/chats/{id}/members/{user_id}'].put.parameters[?(@.name=='id')]
    update:
      description: Chat ID
  - target: $.paths['/chats/{id}/members/{user_id}'].put.parameters[?(@.name=='user_id')]
    update:
      description: User ID
  - target: $.paths['/chats/{id}/unarchive'].put
    update:
      description: |-
        Unarchive chat

        Restore a chat from the archive.

        To unarchive a chat you need to know its `id` and specify it in the request `URL`.
  - target: $.paths['/chats/{id}/unarchive'].put.parameters[?(@.name=='id')]
    update:
      description: Chat ID
  - target: $.paths['/custom_properties'].get
    update:
      description: >-
        List custom properties


        Working with "File" type custom properties is currently unavailable.


        Retrieve the current list of custom properties for employees and tasks in your workspace.


        By default, all entities in your workspace only have basic fields. However, your workspace administrator can
        add, edit, and delete custom properties. If you use custom properties that are no longer current (deleted or
        non-existent) when creating employees (or tasks), you will receive an error.
  - target: $.paths['/custom_properties'].get.parameters[?(@.name=='entity_type')]
    update:
      description: Entity type
  - target: $.paths['/direct_url'].post
    update:
      description: >-
        Upload file


        Upload a file to the server using `multipart/form-data` format. Upload parameters are obtained via the [Get
        signature, key and other parameters](POST /uploads) method.
  - target: $.paths['/group_tags'].post
    update:
      description: |-
        New tag

        Create a new tag.
  - target: $.paths['/group_tags'].get
    update:
      description: |-
        List employee tags

        Retrieve the current list of employee tags. Tag names are unique within the workspace.
  - target: $.paths['/group_tags'].get.parameters[?(@.name=='names')]
    update:
      description: Array of tag names to filter by
  - target: $.paths['/group_tags'].get.parameters[?(@.name=='limit')]
    update:
      description: Number of records to return per request
  - target: $.paths['/group_tags'].get.parameters[?(@.name=='cursor')]
    update:
      description: Pagination cursor (from `meta.paginate.next_page`)
  - target: $.paths['/group_tags/{id}'].get
    update:
      description: |-
        Tag info

        Retrieve information about a tag. Tag names are unique within the workspace.

        To get a tag you need to know its `id` and specify it in the request `URL`.
  - target: $.paths['/group_tags/{id}'].get.parameters[?(@.name=='id')]
    update:
      description: Tag ID
  - target: $.paths['/group_tags/{id}'].put
    update:
      description: >-
        Edit tag


        Edit a tag.


        To edit a tag you need to know its `id` and specify it in the request `URL`. All editable tag parameters are
        specified in the request body.
  - target: $.paths['/group_tags/{id}'].put.parameters[?(@.name=='id')]
    update:
      description: Tag ID
  - target: $.paths['/group_tags/{id}'].delete
    update:
      description: |-
        Delete tag

        Delete a tag.

        To delete a tag you need to know its `id` and specify it in the request `URL`.
  - target: $.paths['/group_tags/{id}'].delete.parameters[?(@.name=='id')]
    update:
      description: Tag ID
  - target: $.paths['/group_tags/{id}/users'].get
    update:
      description: |-
        List tag employees

        Retrieve the current list of employees in a tag.
  - target: $.paths['/group_tags/{id}/users'].get.parameters[?(@.name=='id')]
    update:
      description: Tag ID
  - target: $.paths['/group_tags/{id}/users'].get.parameters[?(@.name=='limit')]
    update:
      description: Number of records to return per request
  - target: $.paths['/group_tags/{id}/users'].get.parameters[?(@.name=='cursor')]
    update:
      description: Pagination cursor (from `meta.paginate.next_page`)
  - target: $.paths['/messages'].post
    update:
      description: >-
        New message


        Send a message to a conversation or channel, a direct message to a user, or a comment to a thread.


        When using `entity_type: "discussion"` (or simply without specifying `entity_type`), any `chat_id` can be passed
        in the `entity_id` field. This means you can send a message knowing only the chat ID. Additionally, you can send
        a message to a thread by its ID or a direct message by the user's ID.


        To send a direct message to a user, you do not need to create a chat. Simply specify `entity_type: "user"` and
        the user's ID. A chat will be created automatically if there has been no prior conversation between you. Only
        one direct chat can exist between two users.
  - target: $.paths['/messages'].get
    update:
      description: >-
        List chat messages


        Retrieve a list of messages from conversations, channels, threads, and direct messages.


        To retrieve messages you need to know the `chat_id` of the required conversation, channel, thread, or direct
        message, and specify it in the request `URL`. Messages are returned in descending order by send date (i.e., the
        most recent messages come first). To retrieve earlier messages, use the `limit` and `cursor` parameters.
  - target: $.paths['/messages'].get.parameters[?(@.name=='chat_id')]
    update:
      description: Chat ID (conversation, channel, direct message, or thread chat)
  - target: $.paths['/messages'].get.parameters[?(@.name=='sort')]
    update:
      description: Sort field
  - target: $.paths['/messages'].get.parameters[?(@.name=='order')]
    update:
      description: Sort direction
  - target: $.paths['/messages'].get.parameters[?(@.name=='limit')]
    update:
      description: Number of records to return per request
  - target: $.paths['/messages'].get.parameters[?(@.name=='cursor')]
    update:
      description: Pagination cursor (from `meta.paginate.next_page`)
  - target: $.paths['/messages/{id}'].get
    update:
      description: |-
        Message info

        Retrieve information about a message.

        To get a message you need to know its `id` and specify it in the request `URL`.
  - target: $.paths['/messages/{id}'].get.parameters[?(@.name=='id')]
    update:
      description: Message ID
  - target: $.paths['/messages/{id}'].put
    update:
      description: >-
        Edit message


        Edit a message or comment.


        To edit a message you need to know its `id` and specify it in the request `URL`. All editable message parameters
        are specified in the request body.
  - target: $.paths['/messages/{id}'].put.parameters[?(@.name=='id')]
    update:
      description: Message ID
  - target: $.paths['/messages/{id}'].delete
    update:
      description: >-
        Delete message


        Delete a message.


        Message deletion is available to the sender, admins, and editors in the chat. In direct messages, both users are
        editors. There are no time restrictions on message deletion.


        To delete a message you need to know its `id` and specify it in the request `URL`.
  - target: $.paths['/messages/{id}'].delete.parameters[?(@.name=='id')]
    update:
      description: Message ID
  - target: $.paths['/messages/{id}/link_previews'].post
    update:
      description: |-
        Unfurl (link previews)

        Create link previews in messages. Only available for Unfurl bots.
  - target: $.paths['/messages/{id}/link_previews'].post.parameters[?(@.name=='id')]
    update:
      description: Message ID
  - target: $.paths['/messages/{id}/pin'].post
    update:
      description: |-
        Pin message

        Pin a message in a chat.

        To pin a message you need to know the message `id` and specify it in the request `URL`.
  - target: $.paths['/messages/{id}/pin'].post.parameters[?(@.name=='id')]
    update:
      description: Message ID
  - target: $.paths['/messages/{id}/pin'].delete
    update:
      description: |-
        Unpin message

        Unpin a message from a chat.

        To unpin a message you need to know the message `id` and specify it in the request `URL`.
  - target: $.paths['/messages/{id}/pin'].delete.parameters[?(@.name=='id')]
    update:
      description: Message ID
  - target: $.paths['/messages/{id}/reactions'].post
    update:
      description: >-
        Add reaction


        Add a reaction to a message.


        To add a reaction you need to know the message `id` and specify it in the request `URL`. Message reactions are
        sent as `Emoji` characters. If the user has already added the same reaction, it will not be duplicated. To
        remove a reaction, use the [Delete reaction](DELETE /messages/{id}/reactions) method.


        **Reaction limits:**


        - Each user can add no more than **20 unique** reactions

        - A message can have no more than **30 unique** reactions

        - The total number of reactions on a message cannot exceed **1000**
  - target: $.paths['/messages/{id}/reactions'].post.parameters[?(@.name=='id')]
    update:
      description: Message ID
  - target: $.paths['/messages/{id}/reactions'].delete
    update:
      description: >-
        Delete reaction


        Remove a reaction from a message.


        To remove a reaction you need to know the message `id` and specify it in the request `URL`. Message reactions
        are stored as `Emoji` characters.


        You can only remove reactions that were added by the authenticated user.
  - target: $.paths['/messages/{id}/reactions'].delete.parameters[?(@.name=='id')]
    update:
      description: Message ID
  - target: $.paths['/messages/{id}/reactions'].delete.parameters[?(@.name=='code')]
    update:
      description: Emoji character of the reaction
  - target: $.paths['/messages/{id}/reactions'].delete.parameters[?(@.name=='name')]
    update:
      description: Text name of the emoji (used for custom emoji)
  - target: $.paths['/messages/{id}/reactions'].get
    update:
      description: |-
        List reactions

        Retrieve the current list of reactions on a message.
  - target: $.paths['/messages/{id}/reactions'].get.parameters[?(@.name=='id')]
    update:
      description: Message ID
  - target: $.paths['/messages/{id}/reactions'].get.parameters[?(@.name=='limit')]
    update:
      description: Number of records to return per request
  - target: $.paths['/messages/{id}/reactions'].get.parameters[?(@.name=='cursor')]
    update:
      description: Pagination cursor (from `meta.paginate.next_page`)
  - target: $.paths['/messages/{id}/read_member_ids'].get
    update:
      description: |-
        List users who read the message

        Retrieve the current list of users who have read the message.
  - target: $.paths['/messages/{id}/read_member_ids'].get.parameters[?(@.name=='id')]
    update:
      description: Message ID
  - target: $.paths['/messages/{id}/read_member_ids'].get.parameters[?(@.name=='limit')]
    update:
      description: Number of records to return per request
  - target: $.paths['/messages/{id}/read_member_ids'].get.parameters[?(@.name=='cursor')]
    update:
      description: Pagination cursor (from `meta.paginate.next_page`)
  - target: $.paths['/messages/{id}/thread'].post
    update:
      description: >-
        New thread


        Create a new thread on a message.


        If a thread has already been created for the message, the response will return information about the previously
        created thread.
  - target: $.paths['/messages/{id}/thread'].post.parameters[?(@.name=='id')]
    update:
      description: Message ID
  - target: $.paths['/oauth/token/info'].get
    update:
      description: >-
        Token info


        Retrieve information about the current OAuth token, including its scopes, creation date, and last usage date.
        The token in the response is masked — only the first 8 and last 4 characters are visible.
  - target: $.paths['/profile'].get
    update:
      description: |-
        Profile info

        Retrieve information about your own profile.
  - target: $.paths['/profile/status'].get
    update:
      description: |-
        Current status

        Retrieve information about your current status.
  - target: $.paths['/profile/status'].put
    update:
      description: |-
        New status

        Set a new status for yourself.
  - target: $.paths['/profile/status'].delete
    update:
      description: |-
        Delete status

        Delete your current status.
  - target: $.paths['/profile/avatar'].put
    update:
      description: |-
        Upload avatar

        Upload or update your profile avatar. The file is sent in `multipart/form-data` format.
  - target: $.paths['/profile/avatar'].put.requestBody.properties.image
    update:
      description: Avatar image file
  - target: $.paths['/profile/avatar'].delete
    update:
      description: |-
        Delete avatar

        Delete your profile avatar.
  - target: $.paths['/search/chats'].get
    update:
      description: |-
        Search chats

        Full-text search for channels and conversations.
  - target: $.paths['/search/chats'].get.parameters[?(@.name=='query')]
    update:
      description: Search query text
  - target: $.paths['/search/chats'].get.parameters[?(@.name=='limit')]
    update:
      description: Number of results to return per request
  - target: $.paths['/search/chats'].get.parameters[?(@.name=='cursor')]
    update:
      description: Pagination cursor (from `meta.paginate.next_page`)
  - target: $.paths['/search/chats'].get.parameters[?(@.name=='order')]
    update:
      description: Sort direction
  - target: $.paths['/search/chats'].get.parameters[?(@.name=='created_from')]
    update:
      description: Filter by creation date (from)
  - target: $.paths['/search/chats'].get.parameters[?(@.name=='created_to')]
    update:
      description: Filter by creation date (to)
  - target: $.paths['/search/chats'].get.parameters[?(@.name=='active')]
    update:
      description: Filter by chat activity
  - target: $.paths['/search/chats'].get.parameters[?(@.name=='chat_subtype')]
    update:
      description: Filter by chat type
  - target: $.paths['/search/chats'].get.parameters[?(@.name=='personal')]
    update:
      description: Filter by direct chats
  - target: $.paths['/search/messages'].get
    update:
      description: |-
        Search messages

        Full-text search for messages.
  - target: $.paths['/search/messages'].get.parameters[?(@.name=='query')]
    update:
      description: Search query text
  - target: $.paths['/search/messages'].get.parameters[?(@.name=='limit')]
    update:
      description: Number of results to return per request
  - target: $.paths['/search/messages'].get.parameters[?(@.name=='cursor')]
    update:
      description: Pagination cursor (from `meta.paginate.next_page`)
  - target: $.paths['/search/messages'].get.parameters[?(@.name=='order')]
    update:
      description: Sort direction
  - target: $.paths['/search/messages'].get.parameters[?(@.name=='created_from')]
    update:
      description: Filter by creation date (from)
  - target: $.paths['/search/messages'].get.parameters[?(@.name=='created_to')]
    update:
      description: Filter by creation date (to)
  - target: $.paths['/search/messages'].get.parameters[?(@.name=='chat_ids')]
    update:
      description: Filter by chat IDs
  - target: $.paths['/search/messages'].get.parameters[?(@.name=='user_ids')]
    update:
      description: Filter by message author IDs
  - target: $.paths['/search/messages'].get.parameters[?(@.name=='active')]
    update:
      description: Filter by chat activity
  - target: $.paths['/search/users'].get
    update:
      description: |-
        Search employees

        Full-text search for employees by name, email, position, and other fields.
  - target: $.paths['/search/users'].get.parameters[?(@.name=='query')]
    update:
      description: Search query text
  - target: $.paths['/search/users'].get.parameters[?(@.name=='limit')]
    update:
      description: Number of results to return per request
  - target: $.paths['/search/users'].get.parameters[?(@.name=='cursor')]
    update:
      description: Pagination cursor (from `meta.paginate.next_page`)
  - target: $.paths['/search/users'].get.parameters[?(@.name=='sort')]
    update:
      description: Sort results by
  - target: $.paths['/search/users'].get.parameters[?(@.name=='order')]
    update:
      description: Sort direction
  - target: $.paths['/search/users'].get.parameters[?(@.name=='created_from')]
    update:
      description: Filter by creation date (from)
  - target: $.paths['/search/users'].get.parameters[?(@.name=='created_to')]
    update:
      description: Filter by creation date (to)
  - target: $.paths['/search/users'].get.parameters[?(@.name=='company_roles')]
    update:
      description: Filter by employee roles
  - target: $.paths['/tasks'].post
    update:
      description: >-
        New task


        Create a new task.


        When creating a task, specifying the task type is required: call, meeting, simple reminder, event, or email. No
        additional description is needed — you simply create a task with the corresponding text. If you specify a task
        description, it will become the task's text.


        A task must have assignees; if none are specified, you are assigned as the responsible person.


        Any workspace employee can be assigned to a task that is not linked to any entity. You can get the current
